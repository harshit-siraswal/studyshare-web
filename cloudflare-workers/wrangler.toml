name = "studyspace-edge"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV Namespace for rate limiting
# Create with: wrangler kv:namespace create "RATE_LIMIT_KV"
# Then paste the ID below
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Routes - Update with your actual domain
# Uncomment after setting up your domain in Cloudflare
# [[routes]]
# pattern = "api.yourdomain.me/*"
# zone_name = "yourdomain.me"
