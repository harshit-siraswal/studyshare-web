name: Keep Backend Warm

# Ping backend every 10 minutes to prevent Render cold starts
# This eliminates the 30-60 second delay on first request after inactivity

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.mystudyspace.me/api/health || echo "000")
          echo "Health check response: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: Backend returned $response"
            # Don't fail - just log the warning
          else
            echo "Backend is warm and responding"
          fi

      - name: Log timestamp
        run: echo "Pinged at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
